{% include 'header.html' %}


<div class="dark-pink">
    {% if not meals %}
    <div class="px-5">
        <h1 class="py-5">No results found</h1>
        <div class="dropdown">
            <a class="btn btn-info btn-green btn-lg px-4 me-md-2 dropdown-toggle" href="#" role="button"
               data-bs-toggle="dropdown"
               aria-expanded="false">
                Start searching
            </a>

            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{ url_for('main_ingredient_search') }}">By main ingredient</a></li>
                <li><a class="dropdown-item" href="{{ url_for('name_search') }}">By name</a></li>
                <li><a class="dropdown-item" href="{{ url_for('category_search') }}">By category</a></li>
                <li><a class="dropdown-item" href="{{ url_for('area_search') }}">By area</a></li>
            </ul>
        </div>
    </div>
    {% endif %}

    <div class="container py-5">
        <div class="row justify-content-center">
            {% for meal in meals %}
            <div class="card  mx-3 my-3 py-3 yellow" style="width: 18rem;">
                <img src="{{ meal['strMealThumb'] }}" class="card-img-top" alt="...">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title text-center">{{ meal['strMeal'] }}</h5>
                    <div class="mt-auto text-center">
                        <a href="{{ url_for('get_recipe', meal_id=meal['idMeal']) }}"
                           class="btn btn-primary btn-pink mt-2">View recipe</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

{% include 'footer.html' %}
