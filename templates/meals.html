{% include 'header.html' %}

<div class="dark-pink">
    <div class="container py-5">
<div class="row justify-content-center">
        {% for meal in meals %}
        <div class="card  mx-3 my-3 py-3 yellow" style="width: 18rem;">
            <img src="{{ meal['strMealThumb'] }}" class="card-img-top" alt="...">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title text-center">{{ meal['strMeal'] }}</h5>
                <div class="mt-auto text-center">
                    <a href="{{ url_for('get_recipe', meal_id=meal['idMeal']) }}"
                       class="btn btn-primary btn-pink mt-2">View recipe</a>
                </div>
            </div>
        </div>
        {% endfor %}
</div>
    </div>
</div>

{% include 'footer.html' %}
